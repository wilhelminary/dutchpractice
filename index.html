<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Nederlands — leren van nul</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Public+Sans:ital,wght@0,400;0,500;0,600;1,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#12100E; --card:#1C1A17; --card2:#232019; --ink:#F2EEE6; --ink-soft:#A39B8B;
    --rule:#332F28; --gold:#D6A756; --gold-tint:#3A2F1A; --sage:#8FB08A; --sage-tint:#233026;
    --brick:#D08A6E; --brick-tint:#3A251C; --blue:#8FA9C4; --lock:#4A443A;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--paper);color:var(--ink);font-family:"Public Sans",system-ui,sans-serif;font-size:16px;line-height:1.6;min-height:100vh;padding:24px 18px 90px;display:flex;justify-content:center;-webkit-font-smoothing:antialiased}
  .wrap{width:100%;max-width:660px}
  header{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:6px}
  .brand{font-family:"Fraunces",serif;font-weight:600;font-size:22px;letter-spacing:-0.01em}
  .brand span{color:var(--gold)}
  .streakpill{font-family:"JetBrains Mono",monospace;font-size:12px;color:var(--ink-soft);border:1px solid var(--rule);border-radius:100px;padding:5px 11px}
  .streakpill b{color:var(--gold)}
  nav{display:flex;gap:4px;margin:18px 0 22px;border-bottom:1px solid var(--rule)}
  nav button{font-family:"Public Sans",sans-serif;font-size:14px;font-weight:500;background:none;border:none;color:var(--ink-soft);cursor:pointer;padding:9px 14px;border-bottom:2px solid transparent;margin-bottom:-1px}
  nav button.on{color:var(--ink);border-bottom-color:var(--gold)}
  nav button:hover{color:var(--ink)}
  .card{background:var(--card);border:1px solid var(--rule);border-radius:6px;padding:22px}
  .cta{display:block;width:100%;font-family:"Public Sans",sans-serif;font-size:16px;font-weight:600;background:var(--gold);color:#1a1305;border:none;border-radius:5px;padding:14px;cursor:pointer}
  .cta:hover{filter:brightness(1.06)}
  .cta.small{width:auto;padding:10px 18px;font-size:14px}
  .cta.ghost{background:transparent;color:var(--ink);border:1px solid var(--rule)}
  .cta.ghost:hover{border-color:var(--gold)}

  /* placement banner */
  .banner{background:linear-gradient(160deg,var(--card2),var(--card));border:1px solid var(--gold-tint);border-radius:6px;padding:22px;margin-bottom:20px}
  .banner .lead{font-family:"Fraunces",serif;font-size:15px;color:var(--gold);margin-bottom:4px}
  .banner .big{font-family:"Fraunces",serif;font-size:24px;font-weight:600;line-height:1.2;margin-bottom:6px}
  .banner p{color:var(--ink-soft);font-size:14px;margin-bottom:16px}

  /* skill tree */
  .level{margin-bottom:26px}
  .level-head{display:flex;align-items:center;gap:12px;margin-bottom:14px}
  .level-badge{font-family:"Fraunces",serif;font-weight:700;font-size:13px;letter-spacing:0.05em;color:var(--paper);background:var(--gold);border-radius:4px;padding:3px 9px}
  .level-line{flex:1;height:1px;background:var(--rule)}
  .level-note{font-size:12px;color:var(--ink-soft)}
  .units{display:flex;flex-direction:column;gap:8px}
  .unit{display:flex;align-items:center;gap:14px;background:var(--card);border:1px solid var(--rule);border-radius:8px;padding:14px 16px;cursor:pointer;transition:border-color .15s}
  .unit:hover{border-color:var(--ink-soft)}
  .unit.locked{opacity:.5;cursor:not-allowed}
  .unit.locked:hover{border-color:var(--rule)}
  .unit.done{border-color:var(--sage-tint)}
  .u-dot{flex:0 0 34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:"JetBrains Mono",monospace;font-size:13px;background:var(--card2);border:1px solid var(--rule)}
  .unit.done .u-dot{background:var(--sage-tint);border-color:var(--sage);color:var(--sage)}
  .unit.active .u-dot{background:var(--gold-tint);border-color:var(--gold);color:var(--gold)}
  .u-body{flex:1;min-width:0}
  .u-title{font-weight:600;font-size:15px}
  .u-sub{font-size:12.5px;color:var(--ink-soft);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .u-meta{flex:0 0 auto;font-family:"JetBrains Mono",monospace;font-size:11px;color:var(--ink-soft)}
  .u-lock{flex:0 0 auto;color:var(--lock)}
  .mastery{height:4px;background:var(--card2);border-radius:100px;margin-top:6px;overflow:hidden}
  .mastery i{display:block;height:100%;background:var(--sage);border-radius:100px}

  /* lesson */
  .lesson h2{font-family:"Fraunces",serif;font-size:24px;font-weight:600;letter-spacing:-0.01em;margin-bottom:4px}
  .lesson .lvl{font-family:"JetBrains Mono",monospace;font-size:11px;text-transform:uppercase;letter-spacing:0.06em;color:var(--gold);margin-bottom:16px}
  .lesson .teach{font-size:15.5px;line-height:1.7}
  .lesson .teach p{margin-bottom:13px}
  .lesson .teach b{color:var(--ink);font-weight:600}
  .lesson .teach em{color:var(--gold);font-style:normal;font-family:"JetBrains Mono",monospace;font-size:14px}
  .lesson .box{background:var(--card2);border:1px solid var(--rule);border-radius:6px;padding:14px 16px;margin:14px 0;font-size:14.5px}
  .lesson .box .ex{font-family:"JetBrains Mono",monospace;font-size:14px;margin:4px 0}
  .lesson table{width:100%;border-collapse:collapse;margin:14px 0;font-size:14px}
  .lesson th,.lesson td{border:1px solid var(--rule);padding:7px 10px;text-align:left}
  .lesson th{background:var(--card2);font-weight:600;font-size:12px;text-transform:uppercase;letter-spacing:0.04em;color:var(--ink-soft)}
  .lesson td em{color:var(--gold);font-family:"JetBrains Mono",monospace}

  /* exercise (shared with earlier build) */
  .ex-wrap .eyebrow{display:flex;justify-content:space-between;font-family:"JetBrains Mono",monospace;font-size:11px;letter-spacing:0.06em;text-transform:uppercase;color:var(--ink-soft);margin-bottom:14px}
  .ex-wrap .eyebrow .kind{color:var(--gold)}
  .progressbar{height:4px;background:var(--card2);border-radius:100px;margin-bottom:20px;overflow:hidden}
  .progressbar i{display:block;height:100%;background:var(--gold);transition:width .3s}
  .prompt{font-family:"Fraunces",serif;font-weight:500;font-size:23px;line-height:1.32;margin-bottom:6px}
  .subhint{font-size:14px;color:var(--ink-soft);font-style:italic;margin-bottom:18px}
  .gapline{font-family:"JetBrains Mono",monospace;font-size:17px;line-height:1.9;margin-bottom:18px}
  .gapline .slot{color:var(--gold);border-bottom:1px dashed var(--gold);padding:0 18px}
  input[type=text]{width:100%;font-family:"JetBrains Mono",monospace;font-size:16px;padding:13px 14px;border:1px solid var(--rule);border-radius:5px;background:#0d0b09;color:var(--ink)}
  input[type=text]:focus{outline:2px solid var(--gold);outline-offset:1px;border-color:var(--gold)}
  input[type=text]:disabled{opacity:.6}
  .choices{display:grid;gap:9px}
  .choice{font-family:"JetBrains Mono",monospace;font-size:15px;text-align:left;background:#0d0b09;border:1px solid var(--rule);color:var(--ink);border-radius:5px;padding:13px 15px;cursor:pointer}
  .choice:hover{border-color:var(--ink-soft)}
  .choice.picked{border-color:var(--gold)}
  .choice.right{border-color:var(--sage);background:var(--sage-tint)}
  .choice.wrong{border-color:var(--brick);background:var(--brick-tint)}
  .row{display:flex;gap:9px;margin-top:16px;flex-wrap:wrap}
  button.act{font-family:"Public Sans",sans-serif;font-size:14px;font-weight:600;padding:11px 20px;border-radius:5px;border:none;background:var(--gold);color:#1a1305;cursor:pointer}
  button.ghost{background:transparent;color:var(--ink-soft);border:1px solid var(--rule)}
  button.ghost:hover{color:var(--ink);border-color:var(--ink-soft)}
  button:focus-visible{outline:2px solid var(--blue);outline-offset:2px}
  .verdict{margin-top:18px;border-radius:6px;padding:15px 16px;border:1px solid var(--rule)}
  .verdict.good{border-color:var(--sage);background:var(--sage-tint)}
  .verdict.bad{border-color:var(--brick);background:var(--brick-tint)}
  .verdict h3{font-family:"Fraunces",serif;font-size:15px;font-weight:600;margin-bottom:8px}
  .verdict.good h3{color:var(--sage)} .verdict.bad h3{color:var(--brick)}
  .answer{font-family:"JetBrains Mono",monospace;font-size:15px;margin:7px 0;word-break:break-word}
  .answer .bad-tok{color:var(--brick);text-decoration:line-through} .answer .fix{color:var(--sage);font-weight:500}
  .diag{font-size:14.5px;margin-top:9px}
  .rulebox{font-size:13px;color:var(--ink-soft);margin-top:10px;padding-top:9px;border-top:1px solid rgba(255,255,255,0.07)}
  .sched{font-family:"JetBrains Mono",monospace;font-size:11px;color:var(--ink-soft);margin-top:8px}
  /* copy-and-correct reproduction step */
  .repro{margin-top:14px;padding-top:12px;border-top:1px solid rgba(255,255,255,0.07)}
  .repro .lbl{font-size:13px;color:var(--ink-soft);margin-bottom:8px}
  .repro .lbl b{color:var(--gold)}
  .repro input{width:100%;font-family:"JetBrains Mono",monospace;font-size:16px;padding:12px 14px;border:1px solid var(--gold);border-radius:5px;background:#0d0b09;color:var(--ink)}
  .repro input:focus{outline:2px solid var(--gold);outline-offset:1px}
  .repro input.matched{border-color:var(--sage);outline-color:var(--sage)}
  .repro .hint{font-size:12px;color:var(--ink-soft);margin-top:7px;min-height:16px}
  .repro .hint.ok{color:var(--sage)}
  /* dialogue reader */
  .dlg-card{background:var(--card);border:1px solid var(--rule);border-radius:8px;padding:16px 18px;cursor:pointer;transition:border-color .15s}
  .dlg-card:hover{border-color:var(--gold)}
  .dlg-card h3{font-family:"Fraunces",serif;font-size:17px;font-weight:600;margin-bottom:3px}
  .dlg-card p{font-size:13px;color:var(--ink-soft)}
  .dlg-line{display:flex;gap:12px;margin-bottom:14px;align-items:flex-start}
  .dlg-line.b{flex-direction:row-reverse;text-align:right}
  .dlg-who{flex:0 0 auto;font-family:"JetBrains Mono",monospace;font-size:11px;font-weight:500;padding:4px 9px;border-radius:100px;white-space:nowrap;margin-top:3px}
  .dlg-who.a{background:var(--gold-tint);color:var(--gold)}
  .dlg-who.b{background:var(--sage-tint);color:var(--sage)}
  .dlg-bubble{flex:1;min-width:0}
  .dlg-nl{font-size:17px;line-height:1.5}
  .dlg-line.a .dlg-nl{color:var(--ink)}
  .dlg-line.b .dlg-nl{color:var(--ink)}
  .dlg-en{font-size:13.5px;color:var(--ink-soft);font-style:italic;margin-top:3px}
  .dlg-en.hidden{display:none}
  .dlg-legend{display:flex;gap:16px;font-size:13px;color:var(--ink-soft);margin-bottom:18px;flex-wrap:wrap}
  .dlg-legend span{display:inline-flex;align-items:center;gap:6px}
  .dot{width:10px;height:10px;border-radius:50%;display:inline-block}
  .dot.a{background:var(--gold)} .dot.b{background:var(--sage)}
  .center{text-align:center}
  .big-num{font-family:"Fraunces",serif;font-size:40px;font-weight:600;color:var(--gold);line-height:1}
  .sr{position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0 0 0 0)}
  .muted{color:var(--ink-soft);font-size:14px}
  .set p{color:var(--ink-soft);font-size:14px;margin-bottom:14px}
  textarea{width:100%;height:110px;font-family:"JetBrains Mono",monospace;font-size:12px;background:#0d0b09;color:var(--ink);border:1px solid var(--rule);border-radius:5px;padding:12px;resize:vertical}
  .danger{color:var(--brick)}
  .note{font-size:12.5px;color:var(--ink-soft);margin-top:6px;line-height:1.5}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="brand">Neder<span>lands</span></div>
    <div class="streakpill">streak <b id="dstreak">0</b></div>
  </header>
  <nav>
    <button data-tab="learn" class="on">Learn</button>
    <button data-tab="review">Review</button>
    <button data-tab="gen">Generate</button>
    <button data-tab="dialogue">Read together</button>
    <button data-tab="mistakes">Mistakes</button>
    <button data-tab="drill">AI ∞</button>
    <button data-tab="data">Data</button>
  </nav>
  <div id="view"></div>
</div>

<script>
/* =========================================================================
   CURRICULUM
   Levels → units. Each unit: id, title, sub, a lesson (HTML), and exercises.
   Exercise types: type | gap | mc.  Each carries its own answer + rule.
   placement: a subset flagged for the placement test, ascending difficulty.
========================================================================= */
const LEVELS = [
  { code:"A0", note:"the absolute basics", units:[
    { id:"a0_thisis", title:"This is / a & the", sub:"een, de, het, dit is",
      lesson:`<p>Dutch has two words for <b>“the”</b>: <em>de</em> and <em>het</em>. There's no deep logic — you learn each noun <b>with</b> its article. Two useful anchors: <b>all plurals</b> take <em>de</em>, and <b>all diminutives</b> (words ending <em>-je</em>) take <em>het</em>.</p>
      <p>Roughly two-thirds of nouns are <em>de</em> words; the rest are <em>het</em>. <b>“A”</b> is always <em>een</em>, for every noun, no exceptions.</p>
      <div class="box"><div class="ex">de man · de vrouw · de tafel · <b>het</b> huis · <b>het</b> kind · <b>het</b> boek</div><div class="ex">een man · een huis (a/an never changes)</div></div>
      <p><b>“This is”</b> = <em>dit is</em>. <b>“That is”</b> = <em>dat is</em>. These don't change for de/het: <em>dit is het huis</em>, <em>dit is de man</em>.</p>`,
      ex:[
        {type:"mc", en:"'A house' — which article?", stem:"___ huis", choices:["een","de","het","dit"], answer:"een", rule:"'A' is always een."},
        {type:"mc", en:"'The house'", stem:"___ huis", choices:["het","de","een","dat"], answer:"het", rule:"huis is a het-word."},
        {type:"mc", en:"'The man'", stem:"___ man", choices:["de","het","een","dat"], answer:"de", rule:"man is a de-word."},
        {type:"mc", en:"'The child'", stem:"___ kind", choices:["het","de","een","dit"], answer:"het", rule:"kind is a het-word."},
        {type:"type", en:"This is a man.", ok:["dit is een man"], rule:"dit is = this is."},
        {type:"type", en:"That is a house.", ok:["dat is een huis"], rule:"dat is = that is."},
        {type:"gap", en:"The woman (de/het?)", template:"___ vrouw", ok:["de"], rule:"vrouw is a de-word."},
        {type:"gap", en:"The book (de/het?)", template:"___ boek", ok:["het"], rule:"boek is a het-word."},
        {type:"type", en:"This is the woman.", ok:["dit is de vrouw"], rule:"dit is + de/het noun."}
      ]},
    { id:"a0_ben", title:"To be: zijn", sub:"ik ben, jij bent, hij is",
      lesson:`<p>The verb <em>zijn</em> (“to be”) is irregular and you'll use it constantly. Learn all six forms cold:</p>
      <table><tr><th>person</th><th>form</th></tr><tr><td>ik</td><td><em>ben</em></td></tr><tr><td>jij / je</td><td><em>bent</em></td></tr><tr><td>hij / zij / het</td><td><em>is</em></td></tr><tr><td>wij / we</td><td><em>zijn</em></td></tr><tr><td>jullie</td><td><em>zijn</em></td></tr><tr><td>zij (they)</td><td><em>zijn</em></td></tr></table>
      <p>Note that <em>jij</em> and <em>je</em> are the same word (je is just unstressed). Same for <em>wij/we</em> and <em>zij/ze</em>.</p>`,
      ex:[
        {type:"gap", en:"I am tired.", template:"ik ___ moe", ok:["ben"], rule:"ik ben."},
        {type:"gap", en:"You are nice. (informal)", template:"jij ___ aardig", ok:["bent"], rule:"jij bent."},
        {type:"mc", en:"He ___ big.", stem:"hij ___ groot", choices:["is","ben","bent","zijn"], answer:"is", rule:"hij is."},
        {type:"gap", en:"She is happy.", template:"zij ___ blij", ok:["is"], rule:"zij is."},
        {type:"type", en:"We are happy.", ok:["wij zijn blij","we zijn blij"], rule:"wij zijn."},
        {type:"type", en:"They are tired.", ok:["zij zijn moe","ze zijn moe"], rule:"zij zijn."},
        {type:"mc", en:"You (plural) are here.", stem:"jullie ___ hier", choices:["zijn","bent","is","ben"], answer:"zijn", rule:"jullie zijn."},
        {type:"gap", en:"I am a student.", template:"ik ___ student", ok:["ben"], rule:"ik ben."},
        {type:"type", en:"He is a man.", ok:["hij is een man"], rule:"hij is + een noun."}
      ]},
    { id:"a0_plural", title:"Plurals", sub:"-en and -s",
      lesson:`<p>Most Dutch nouns pluralise with <em>-en</em>. A smaller group takes <em>-s</em> — mainly words ending in <em>-el, -er, -en, -je</em>, and most vowels.</p>
      <div class="box"><div class="ex">boek → boek<b>en</b> · huis → huiz<b>en</b> · man → mann<b>en</b></div><div class="ex">tafel → tafel<b>s</b> · meisje → meisje<b>s</b> · auto → auto<b>'s</b></div></div>
      <p>Watch the spelling shifts: <em>huis → huizen</em> (s→z), <em>man → mannen</em> (double the n to keep the vowel short), and vowel-ending words add <em>'s</em>: <em>auto → auto's</em>, <em>foto → foto's</em>. That doubling rule returns everywhere.</p>`,
      ex:[
        {type:"type", en:"Plural of 'boek'.", ok:["boeken"], rule:"-en plural."},
        {type:"mc", en:"Plural of 'tafel'.", stem:"twee ___", choices:["tafels","tafelen","taffels","tafles"], answer:"tafels", rule:"-el words take -s."},
        {type:"type", en:"Plural of 'man'.", ok:["mannen"], rule:"double the n: mannen."},
        {type:"type", en:"Plural of 'huis'.", ok:["huizen"], rule:"s→z: huizen."},
        {type:"mc", en:"Plural of 'auto'.", stem:"twee ___", choices:["auto's","autos","autoen","autoos"], answer:"auto's", rule:"vowel-ending → 's."},
        {type:"type", en:"Plural of 'vrouw'.", ok:["vrouwen"], rule:"-en plural."},
        {type:"mc", en:"Plural of 'meisje'.", stem:"twee ___", choices:["meisjes","meisjen","meisje's","meisjeen"], answer:"meisjes", rule:"-je diminutive → -s."},
        {type:"type", en:"Plural of 'kind' (irregular: adds -eren).", ok:["kinderen"], rule:"kind → kinderen (irregular)."},
        {type:"type", en:"Plural of 'appel'.", ok:["appels"], rule:"-el → -s."}
      ]},
    { id:"a0_numbers", title:"Numbers & telling time", sub:"één, twee, hoe laat is het",
      lesson:`<p>Core numbers: <em>één, twee, drie, vier, vijf, zes, zeven, acht, negen, tien</em>. Then <em>elf, twaalf, dertien…</em> and <em>twintig, dertig, veertig</em>.</p>
      <p>A quirk: from 21 onwards Dutch says the <b>unit before the ten</b>, joined by <em>en</em>: <em>eenentwintig</em> (one-and-twenty), <em>tweeëndertig</em> (two-and-thirty).</p>
      <div class="box"><div class="ex">Hoe laat is het? — What time is it?</div><div class="ex">Het is drie uur. — It's three o'clock.</div><div class="ex">Het is half vier. — It's half past three (lit. “half four” = halfway to four!)</div></div>
      <p>Careful: <em>half vier</em> means <b>3:30</b>, not 4:30 — Dutch counts toward the coming hour.</p>`,
      ex:[
        {type:"type", en:"Write 'three' in Dutch.", ok:["drie"], rule:"drie = 3."},
        {type:"type", en:"Write 'seven' in Dutch.", ok:["zeven"], rule:"zeven = 7."},
        {type:"mc", en:"What is 'twelve'?", stem:"___", choices:["twaalf","twalf","tweelf","twaalv"], answer:"twaalf", rule:"twaalf = 12."},
        {type:"type", en:"Write 'twenty-one' (one word).", ok:["eenentwintig"], rule:"unit + en + ten: eenentwintig."},
        {type:"type", en:"What time is it? (question)", ok:["hoe laat is het"], rule:"Hoe laat is het?"},
        {type:"gap", en:"It is five o'clock.", template:"het is vijf ___", ok:["uur"], rule:"… uur = o'clock."},
        {type:"mc", en:"'half vier' means…", stem:"half vier = ?", choices:["3:30","4:30","4:00","3:00"], answer:"3:30", rule:"Dutch counts toward the next hour: half vier = 3:30."},
        {type:"type", en:"Write 'ten' in Dutch.", ok:["tien"], rule:"tien = 10."},
        {type:"type", en:"Write 'eight' in Dutch.", ok:["acht"], rule:"acht = 8."}
      ]}
  ]},

  { code:"A1", note:"present tense & simple sentences", units:[
    { id:"a1_present", title:"Present tense", sub:"ik werk, jij werkt, hij werkt",
      lesson:`<p>Regular Dutch verbs in the present are simple. Take the <b>stem</b> (infinitive minus <em>-en</em>): <em>werken → werk</em>. Then:</p>
      <table><tr><th>person</th><th>ending</th><th>example</th></tr><tr><td>ik</td><td>stem</td><td><em>ik werk</em></td></tr><tr><td>jij / hij / zij / het</td><td>stem + <b>t</b></td><td><em>jij werkt</em></td></tr><tr><td>wij / jullie / zij</td><td>full infinitive</td><td><em>wij werken</em></td></tr></table>
      <p>One quirk: in a question, <b>jij drops the -t</b> after the verb — <em>werk jij?</em>, not <em>werkt jij?</em> Also watch spelling: <em>ik woon → wij wonen</em> (one o becomes two when the syllable opens).</p>`,
      ex:[
        {type:"gap", en:"I work in Amsterdam.", template:"ik ___ in Amsterdam", ok:["werk"], rule:"ik + stem."},
        {type:"gap", en:"She drinks coffee.", template:"zij ___ koffie", ok:["drinkt"], rule:"hij/zij + stem + t."},
        {type:"type", en:"We live in Utrecht. (wonen)", ok:["wij wonen in utrecht","we wonen in utrecht"], rule:"plural = infinitive."},
        {type:"mc", en:"Question form: do you play?", stem:"___ jij?", choices:["speel","speelt","spelen","gespeeld"], answer:"speel", rule:"jij drops -t in a question."},
        {type:"gap", en:"He lives in Rotterdam. (wonen)", template:"hij ___ in Rotterdam", ok:["woont"], rule:"hij woont (stem+t)."},
        {type:"type", en:"They play football. (spelen)", ok:["zij spelen voetbal","ze spelen voetbal"], rule:"plural = infinitive."},
        {type:"gap", en:"You eat bread. (eten, informal)", template:"jij ___ brood", ok:["eet"], rule:"eten → eet, jij eet."},
        {type:"mc", en:"'I make' (maken)", stem:"ik ___", choices:["maak","maakt","maken","gemaakt"], answer:"maak", rule:"ik + stem, no -t."},
        {type:"type", en:"We work together. (werken, samen)", ok:["wij werken samen","we werken samen"], rule:"plural infinitive."}
      ]},
    { id:"a1_negation", title:"Saying no: niet & geen", sub:"the two ways to negate",
      lesson:`<p>Dutch has <b>two</b> words for “not/no”, and picking the wrong one is a classic beginner tell.</p>
      <p><b>geen</b> negates an <b>indefinite noun</b> — it replaces <em>een</em> or a bare plural. “not a / no / not any”:</p>
      <div class="box"><div class="ex">Ik heb <b>een</b> auto → Ik heb <b>geen</b> auto. (I don't have a car.)</div><div class="ex">Ik drink <b>koffie</b> → Ik drink <b>geen</b> koffie.</div></div>
      <p><b>niet</b> negates <b>everything else</b> — verbs, adjectives, definite nouns, whole sentences. It usually comes at the end, or before the word it negates:</p>
      <div class="box"><div class="ex">Ik werk <b>niet</b>. · Het is <b>niet</b> mooi. · Ik ken de man <b>niet</b>.</div></div>
      <p>Rule of thumb: if you could put “a” or “any” in the English, use <b>geen</b>. Otherwise <b>niet</b>.</p>`,
      ex:[
        {type:"mc", en:"I don't have a car.", stem:"ik heb ___ auto", choices:["geen","niet","niks","nee"], answer:"geen", rule:"indefinite noun → geen."},
        {type:"type", en:"I don't work.", ok:["ik werk niet"], rule:"verb negation → niet."},
        {type:"mc", en:"I drink no coffee.", stem:"ik drink ___ koffie", choices:["geen","niet","nee","niks"], answer:"geen", rule:"bare noun → geen."},
        {type:"type", en:"It is not nice.", ok:["het is niet mooi","het is niet leuk"], rule:"adjective → niet."},
        {type:"gap", en:"I don't have any bread.", template:"ik heb ___ brood", ok:["geen"], rule:"indefinite → geen."},
        {type:"type", en:"I don't know the man. (kennen)", ok:["ik ken de man niet"], rule:"definite noun → niet, at the end."},
        {type:"mc", en:"She isn't coming.", stem:"zij komt ___", choices:["niet","geen","nee","niks"], answer:"niet", rule:"verb → niet."},
        {type:"type", en:"That is not a house.", ok:["dat is geen huis"], rule:"een → geen."},
        {type:"gap", en:"I'm not tired.", template:"ik ben ___ moe", ok:["niet"], rule:"adjective → niet."}
      ]},
    { id:"a1_wordorder", title:"Word order: verb second", sub:"the finite verb owns slot 2",
      lesson:`<p>The single most important rule in Dutch: <b>the conjugated verb is always the second element</b> of a main clause. If something other than the subject comes first, the subject jumps to <b>after</b> the verb. This is called <b>inversie</b>.</p>
      <div class="box"><div class="ex">Ik ga morgen naar huis.</div><div class="ex">Morgen <b>ga ik</b> naar huis. ← not “Morgen ik ga”</div></div>
      <p>Slot 1 holds exactly <b>one</b> thing (a word, or a whole phrase acting as one unit). The verb is always right behind it. This is why fronting a time word forces inversion — a huge share of natural Dutch sentences start this way.</p>`,
      ex:[
        {type:"type", en:"Tomorrow I'm going home. (start: Morgen)", ok:["morgen ga ik naar huis"], traps:[[/morgen ik ga/,"Inversie: Morgen ga ik…"]], rule:"Verb second → subject moves behind it."},
        {type:"type", en:"Today I work. (start: Vandaag)", ok:["vandaag werk ik"], traps:[[/vandaag ik werk/,"Vandaag werk ik."]], rule:"Inversion after a fronted element."},
        {type:"mc", en:"Which is correct?", stem:"'Now I eat.'", choices:["Nu eet ik","Nu ik eet","Ik nu eet","Nu ik eten"], answer:"Nu eet ik", rule:"Verb second."},
        {type:"type", en:"In Amsterdam I live. (start: In Amsterdam, wonen)", ok:["in amsterdam woon ik"], traps:[[/in amsterdam ik woon/,"Inversie."]], rule:"Fronted phrase → inversion."},
        {type:"type", en:"Tonight we cook. (start: Vanavond, koken)", ok:["vanavond koken wij","vanavond koken we"], rule:"Inversion, plural verb."},
        {type:"mc", en:"'Then he comes.'", stem:"?", choices:["Dan komt hij","Dan hij komt","Hij dan komt","Dan hij komen"], answer:"Dan komt hij", rule:"Verb second after 'dan'."},
        {type:"gap", en:"Tomorrow ___ she to school. (gaan)", template:"morgen ___ zij naar school", ok:["gaat"], rule:"Verb in slot 2: gaat."},
        {type:"type", en:"Here I am. (start: Hier)", ok:["hier ben ik"], rule:"Inversion."}
      ]},
    { id:"a1_questions", title:"Questions", sub:"wie, wat, waar, hoe, wanneer",
      lesson:`<p>Two ways to ask:</p>
      <p><b>Yes/no questions</b> — put the verb <b>first</b>: <em>Werk jij?</em> (Do you work?), <em>Is het mooi?</em> (Is it nice?). Remember jij drops its -t here: <em>werk jij</em>, not <em>werkt jij</em>.</p>
      <p><b>Open questions</b> — start with a question word, then the verb (verb still second):</p>
      <table><tr><th>word</th><th>meaning</th></tr><tr><td><em>wie</em></td><td>who</td></tr><tr><td><em>wat</em></td><td>what</td></tr><tr><td><em>waar</em></td><td>where</td></tr><tr><td><em>wanneer</em></td><td>when</td></tr><tr><td><em>hoe</em></td><td>how</td></tr><tr><td><em>waarom</em></td><td>why</td></tr></table>`,
      ex:[
        {type:"type", en:"Do you work? (informal)", ok:["werk jij","werk je"], traps:[[/werkt jij/,"jij drops -t in a question: werk jij?"]], rule:"Yes/no: verb first, jij drops -t."},
        {type:"gap", en:"Where do you live? (wonen)", template:"waar ___ jij?", ok:["woon"], rule:"waar + verb, jij drops -t."},
        {type:"mc", en:"'What are you doing?'", stem:"___ doe jij?", choices:["Wat","Wie","Waar","Hoe"], answer:"Wat", rule:"wat = what."},
        {type:"type", en:"Who is that? ", ok:["wie is dat"], rule:"wie = who."},
        {type:"gap", en:"When are you coming? (komen)", template:"wanneer ___ jij?", ok:["kom"], rule:"wanneer + verb, jij drops -t."},
        {type:"type", en:"Why are you tired? ", ok:["waarom ben jij moe","waarom ben je moe"], rule:"waarom = why."},
        {type:"mc", en:"'How are you?'", stem:"___ gaat het?", choices:["Hoe","Wat","Wie","Waar"], answer:"Hoe", rule:"Hoe gaat het? = How's it going?"},
        {type:"type", en:"Is it nice? ", ok:["is het mooi","is het leuk"], rule:"Yes/no: verb first."},
        {type:"type", en:"Where is the station? (het station)", ok:["waar is het station"], rule:"waar + is."}
      ]},
    { id:"a1_hebben", title:"To have & to go", sub:"hebben, gaan",
      lesson:`<p>Two more essential irregulars you'll lean on constantly.</p>
      <table><tr><th></th><th>hebben</th><th>gaan</th></tr><tr><td>ik</td><td><em>heb</em></td><td><em>ga</em></td></tr><tr><td>jij</td><td><em>hebt</em></td><td><em>gaat</em></td></tr><tr><td>hij/zij</td><td><em>heeft</em></td><td><em>gaat</em></td></tr><tr><td>wij/jullie/zij</td><td><em>hebben</em></td><td><em>gaan</em></td></tr></table>
      <p><em>hebben</em> is also how you say your age: <em>Ik heb honger</em> (I'm hungry, lit. “I have hunger”), <em>Ik heb het koud</em> (I'm cold).</p>`,
      ex:[
        {type:"mc", en:"He ___ a car.", stem:"hij ___ een auto", choices:["heeft","hebt","heb","hebben"], answer:"heeft", rule:"hij heeft."},
        {type:"gap", en:"I have a dog.", template:"ik ___ een hond", ok:["heb"], rule:"ik heb."},
        {type:"type", en:"We go to school.", ok:["wij gaan naar school","we gaan naar school"], rule:"wij gaan."},
        {type:"gap", en:"You have a book. (informal)", template:"jij ___ een boek", ok:["hebt"], rule:"jij hebt."},
        {type:"type", en:"She goes home.", ok:["zij gaat naar huis","ze gaat naar huis"], rule:"zij gaat."},
        {type:"gap", en:"I'm hungry. (lit. have hunger)", template:"ik ___ honger", ok:["heb"], rule:"Ik heb honger."},
        {type:"mc", en:"They ___ a house.", stem:"zij ___ een huis", choices:["hebben","heeft","hebt","heb"], answer:"hebben", rule:"zij hebben."},
        {type:"type", en:"Where are you going? (informal)", ok:["waar ga jij naartoe","waar ga je naartoe","waar ga jij heen","waar ga je heen"], rule:"waar ga jij naartoe?"},
        {type:"gap", en:"He goes to the market.", template:"hij ___ naar de markt", ok:["gaat"], rule:"hij gaat."}
      ]},
    { id:"a1_possessive", title:"Possessives", sub:"mijn, jouw, zijn, haar, ons",
      lesson:`<p>“My, your, his…” — these sit before the noun and mostly don't change:</p>
      <table><tr><th>person</th><th>possessive</th></tr><tr><td>ik</td><td><em>mijn</em> (my)</td></tr><tr><td>jij</td><td><em>jouw / je</em> (your)</td></tr><tr><td>hij</td><td><em>zijn</em> (his)</td></tr><tr><td>zij</td><td><em>haar</em> (her)</td></tr><tr><td>wij</td><td><em>ons / onze</em> (our)</td></tr><tr><td>jullie</td><td><em>jullie</em> (your)</td></tr><tr><td>zij (pl)</td><td><em>hun</em> (their)</td></tr></table>
      <p>Only <em>ons/onze</em> changes with de/het: <b>ons</b> huis (het-word), but <b>onze</b> auto (de-word) and always <b>onze</b> before plurals.</p>`,
      ex:[
        {type:"gap", en:"my house", template:"___ huis", ok:["mijn"], rule:"mijn = my."},
        {type:"gap", en:"her book", template:"___ boek", ok:["haar"], rule:"haar = her."},
        {type:"gap", en:"his car", template:"___ auto", ok:["zijn"], rule:"zijn = his."},
        {type:"mc", en:"our house (het huis)", stem:"___ huis", choices:["ons","onze","onzen","onz"], answer:"ons", rule:"het-word → ons."},
        {type:"mc", en:"our car (de auto)", stem:"___ auto", choices:["onze","ons","onze'","onz"], answer:"onze", rule:"de-word → onze."},
        {type:"type", en:"their house", ok:["hun huis"], rule:"hun = their."},
        {type:"gap", en:"your dog (informal)", template:"___ hond", ok:["jouw","je"], rule:"jouw/je = your."},
        {type:"type", en:"my mother", ok:["mijn moeder"], rule:"mijn = my."},
        {type:"mc", en:"our children (plural)", stem:"___ kinderen", choices:["onze","ons","onze'","onzen"], answer:"onze", rule:"plural → always onze."}
      ]}
  ]},

  { code:"A2", note:"the past & richer verbs", units:[
    { id:"a2_perfect", title:"Perfect tense", sub:"ik heb gewerkt",
      lesson:`<p>The perfect is Dutch's main spoken past tense: an auxiliary (<em>hebben</em> or <em>zijn</em>) + a <b>past participle</b> at the end.</p>
      <p>Regular participle = <em>ge-</em> + stem + <b>-t</b> or <b>-d</b>. Which ending? The <b>'t kofschip</b> rule: if the stem ends in one of the sounds in <em>'t kofschip</em> (t, k, f, s, ch, p) → <b>-t</b>; otherwise → <b>-d</b>.</p>
      <div class="box"><div class="ex">werken → <b>gewerkt</b> (k → t)</div><div class="ex">spelen → <b>gespeeld</b> (l → d)</div><div class="ex">koken → <b>gekookt</b> (k → t)</div></div>
      <p>The participle goes to the <b>very end</b>: <em>Ik heb gisteren hard gewerkt.</em> Judge the ending by the <b>infinitive's</b> consonant, not the devoiced stem — <em>reizen</em> has a z → <em>gereisd</em>.</p>`,
      ex:[
        {type:"type", en:"I have worked.", ok:["ik heb gewerkt"], rule:"ge + werk + t."},
        {type:"gap", en:"I have played football.", template:"ik heb voetbal ___", ok:["gespeeld"], rule:"ge + speel + d."},
        {type:"mc", en:"Participle of 'maken'.", stem:"ik heb het ___", choices:["gemaakt","gemaakd","gemaken","maakte"], answer:"gemaakt", rule:"k → t: gemaakt."},
        {type:"type", en:"I have cooked. (koken)", ok:["ik heb gekookt"], rule:"k → t: gekookt."},
        {type:"gap", en:"I have travelled. (reizen)", template:"ik heb ___", ok:["gereisd"], traps:[[/gereist/,"z isn't in 't kofschip → -d: gereisd."]], rule:"Judge by infinitive: reizen → gereisd."},
        {type:"mc", en:"Participle of 'horen' (to hear).", stem:"ik heb het ___", choices:["gehoord","gehoort","gehoren","hoorde"], answer:"gehoord", rule:"r → d: gehoord."},
        {type:"type", en:"She has learned. (leren)", ok:["zij heeft geleerd","ze heeft geleerd"], rule:"r → d: geleerd."},
        {type:"gap", en:"We have lived here. (wonen)", template:"wij hebben hier ___", ok:["gewoond"], rule:"n → d: gewoond."},
        {type:"type", en:"I have paid. (betalen — inseparable be-)", ok:["ik heb betaald"], traps:[[/gebetaald/,"be- is inseparable → no ge-: betaald."]], rule:"Inseparable be- → no ge-."}
      ]},
    { id:"a2_hebzijn", title:"hebben or zijn?", sub:"the auxiliary split",
      lesson:`<p>In the perfect, most verbs take <em>hebben</em> — but verbs of <b>change of location or state</b> take <em>zijn</em>: <em>gaan, komen, worden, blijven, beginnen, stoppen, vertrekken, aankomen</em>.</p>
      <div class="box"><div class="ex">Ik <b>heb</b> gewerkt.</div><div class="ex">Ik <b>ben</b> naar huis gegaan.</div><div class="ex">Hij <b>is</b> ziek geworden.</div></div>
      <p><b>The trap:</b> movement verbs like <em>fietsen, lopen, rijden, zwemmen</em> take <em>zijn</em> only when there's a <b>destination</b>. <em>Ik heb gefietst</em> (activity) vs <em>Ik ben naar school gefietst</em> (destination). This one catches everyone repeatedly.</p>`,
      ex:[
        {type:"mc", en:"She has gone home.", stem:"zij ___ naar huis gegaan", choices:["is","heeft","hebt","was"], answer:"is", rule:"gaan → zijn."},
        {type:"type", en:"I cycled to school. (destination)", ok:["ik ben naar school gefietst"], traps:[[/heb/,"Destination → zijn."]], rule:"movement + destination → zijn."},
        {type:"type", en:"I cycled for an hour. (no destination)", ok:["ik heb een uur gefietst"], traps:[[/ben/,"No destination → hebben."]], rule:"no destination → hebben."},
        {type:"mc", en:"He has become ill.", stem:"hij ___ ziek geworden", choices:["is","heeft","was","wordt"], answer:"is", rule:"worden → zijn."},
        {type:"type", en:"I have never been to Rotterdam. (zijn → geweest)", ok:["ik ben nooit in rotterdam geweest","ik ben nog nooit in rotterdam geweest"], traps:[[/heb/,"zijn takes zijn: ik ben … geweest."]], rule:"zijn → is/ben geweest."},
        {type:"mc", en:"We have stayed home. (blijven)", stem:"wij ___ thuis gebleven", choices:["zijn","hebben","hebt","waren"], answer:"zijn", rule:"blijven → zijn."},
        {type:"type", en:"He has walked to the station. (destination)", ok:["hij is naar het station gelopen"], rule:"movement + destination → zijn."},
        {type:"type", en:"I have swum. (no destination, zwemmen)", ok:["ik heb gezwommen"], rule:"no destination → hebben."},
        {type:"mc", en:"The film has begun. (beginnen)", stem:"de film ___ begonnen", choices:["is","heeft","was","wordt"], answer:"is", rule:"beginnen → zijn."}
      ]},
    { id:"a2_imperfect", title:"Imperfect tense", sub:"ik werkte, ik was",
      lesson:`<p>The <b>imperfect</b> (simple past) is used for <b>narration, description, and background</b> — telling a story, describing how things were. In writing especially, you narrate in the imperfect.</p>
      <p>Regular verbs: stem + <b>-te(n)</b> or <b>-de(n)</b>, following the same <em>'t kofschip</em> rule. If the stem ends in t,k,f,s,ch,p → <b>-te</b>; otherwise → <b>-de</b>:</p>
      <div class="box"><div class="ex">werken → <b>werkte</b> / werkten</div><div class="ex">spelen → <b>speelde</b> / speelden</div></div>
      <p>The essentials are irregular and worth memorising: <em>zijn → was/waren</em>, <em>hebben → had/hadden</em>, <em>gaan → ging</em>, <em>kunnen → kon</em>, <em>moeten → moest</em>, <em>willen → wilde</em>.</p>`,
      ex:[
        {type:"gap", en:"I worked yesterday. (werken, imperfect)", template:"ik ___ gisteren", ok:["werkte"], rule:"k → -te: werkte."},
        {type:"mc", en:"'I was' (zijn, imperfect)", stem:"ik ___", choices:["was","ben","werd","waren"], answer:"was", rule:"zijn → was."},
        {type:"gap", en:"It rained all day. (regenen)", template:"het ___ de hele dag", ok:["regende"], rule:"n → -de: regende."},
        {type:"type", en:"I had no time. (hebben, imperfect)", ok:["ik had geen tijd"], traps:[[/heb geen tijd/,"Past narration → had, not heb."]], rule:"hebben → had."},
        {type:"mc", en:"'We went' (gaan, imperfect)", stem:"wij ___", choices:["gingen","gaan","gingden","gaanden"], answer:"gingen", rule:"gaan → ging/gingen."},
        {type:"gap", en:"She played outside. (spelen)", template:"zij ___ buiten", ok:["speelde"], rule:"l → -de: speelde."},
        {type:"type", en:"I couldn't sleep. (kunnen, imperfect)", ok:["ik kon niet slapen"], rule:"kunnen → kon."},
        {type:"type", en:"We were tired. (zijn, imperfect)", ok:["wij waren moe","we waren moe"], rule:"zijn → waren."},
        {type:"gap", en:"He lived in Utrecht. (wonen)", template:"hij ___ in Utrecht", ok:["woonde"], rule:"n → -de: woonde."}
      ]},
    { id:"a2_separable", title:"Separable verbs", sub:"opbellen, meenemen",
      lesson:`<p>Many Dutch verbs have a detachable prefix: <em>opbellen</em> (to phone), <em>meenemen</em> (to bring along), <em>aankomen</em> (to arrive). Where the prefix goes depends on the sentence:</p>
      <table><tr><th>situation</th><th>what happens</th></tr>
      <tr><td>main clause</td><td>splits: <em>ik bel je op</em></td></tr>
      <tr><td>participle</td><td>ge- in the middle: <em>opgebeld</em></td></tr>
      <tr><td>subordinate clause</td><td>rejoins at the end: <em>…dat ik je opbel</em></td></tr>
      <tr><td>after a modal</td><td>stays whole: <em>ik moet je opbellen</em></td></tr>
      <tr><td>with te</td><td>te inside: <em>om je op te bellen</em></td></tr></table>
      <p>Tell separable from inseparable by <b>stress</b>: <b>OP</b>bellen (stressed prefix, splits) vs be<b>TAL</b>en (stressed stem, never splits).</p>`,
      ex:[
        {type:"type", en:"I call my mother. (opbellen)", ok:["ik bel mijn moeder op"], traps:[[/opbel mijn|ik opbel/,"Main clause splits: bel … op."]], rule:"Main clause: prefix to the end."},
        {type:"type", en:"I have called him. (opbellen)", ok:["ik heb hem opgebeld"], traps:[[/geopbeld/,"ge- in the middle: opgebeld."]], rule:"Participle: prefix + ge + stem."},
        {type:"type", en:"I have to call him.", ok:["ik moet hem opbellen"], rule:"After a modal: whole infinitive."},
        {type:"type", en:"I think that he's arriving. (aankomen, subordinate)", ok:["ik denk dat hij aankomt"], traps:[[/aankomen/,"Subordinate: still conjugates → aankomt."]], rule:"Subordinate: rejoins, stays finite."},
        {type:"type", en:"I'm trying to tidy up. (proberen, opruimen)", ok:["ik probeer op te ruimen"], traps:[[/te opruimen/,"te goes inside: op te ruimen."]], rule:"te splits it: op te ruimen."},
        {type:"gap", en:"She takes the book with her. (meenemen)", template:"zij ___ het boek ___", ok:["neemt mee"], rule:"Main clause: neemt … mee."},
        {type:"type", en:"I have brought food. (meenemen)", ok:["ik heb eten meegenomen"], traps:[[/meegenoomd|geneemd/,"Strong + separable: meegenomen."]], rule:"mee + ge + nomen."},
        {type:"mc", en:"He gets up early. (opstaan)", stem:"hij ___ vroeg ___", choices:["staat / op","opstaat / —","staat op / —","op / staat"], answer:"staat / op", rule:"Main clause splits: staat … op."},
        {type:"type", en:"The train arrives at eight. (aankomen)", ok:["de trein komt om acht uur aan"], rule:"Main clause: komt … aan."}
      ]},
    { id:"a2_modals", title:"Modal verbs", sub:"kunnen, moeten, willen, mogen",
      lesson:`<p>Modals express ability, obligation, desire, permission — and they send their second verb to the <b>end</b> as an <b>infinitive</b>.</p>
      <table><tr><th></th><th>ik-form</th><th>meaning</th></tr><tr><td>kunnen</td><td><em>kan</em></td><td>can / be able</td></tr><tr><td>moeten</td><td><em>moet</em></td><td>must / have to</td></tr><tr><td>willen</td><td><em>wil</em></td><td>want</td></tr><tr><td>mogen</td><td><em>mag</em></td><td>may / be allowed</td></tr><tr><td>zullen</td><td><em>zal</em></td><td>will / shall</td></tr></table>
      <div class="box"><div class="ex">Ik <b>kan</b> Nederlands <b>spreken</b>.</div><div class="ex">Je <b>moet</b> nu <b>gaan</b>.</div></div>`,
      ex:[
        {type:"gap", en:"I can swim.", template:"ik ___ zwemmen", ok:["kan"], rule:"kunnen → kan."},
        {type:"type", en:"I want to go home.", ok:["ik wil naar huis gaan","ik wil naar huis"], rule:"willen → wil, infinitive to the end."},
        {type:"mc", en:"You must work.", stem:"jij ___ werken", choices:["moet","moett","moeten","mag"], answer:"moet", rule:"jij moet."},
        {type:"gap", en:"May I sit here? (mogen)", template:"___ ik hier zitten?", ok:["mag"], rule:"mogen → mag."},
        {type:"type", en:"We have to leave now. (moeten, weggaan)", ok:["wij moeten nu weggaan","we moeten nu weggaan"], rule:"modal + infinitive at the end."},
        {type:"mc", en:"She can speak Dutch.", stem:"zij ___ Nederlands spreken", choices:["kan","kant","kunnen","kann"], answer:"kan", rule:"zij kan."},
        {type:"type", en:"I want to learn Dutch. (leren)", ok:["ik wil nederlands leren"], rule:"wil + infinitive at end."},
        {type:"gap", en:"You may go. (informal, mogen)", template:"jij ___ gaan", ok:["mag"], rule:"jij mag."},
        {type:"type", en:"Can you help me? (kunnen, helpen, informal)", ok:["kan jij mij helpen","kan je me helpen","kun jij mij helpen","kun je me helpen"], rule:"kan/kun jij + infinitive."}
      ]},
    { id:"a2_reflexive", title:"Reflexive verbs", sub:"zich wassen, me voelen",
      lesson:`<p>Some verbs take a <b>reflexive pronoun</b> — the action loops back to the subject. English often hides this (“I feel good” = Dutch “I feel <b>myself</b> good”).</p>
      <table><tr><th>person</th><th>pronoun</th></tr><tr><td>ik</td><td><em>me / mij</em></td></tr><tr><td>jij</td><td><em>je</em></td></tr><tr><td>hij/zij</td><td><em>zich</em></td></tr><tr><td>wij</td><td><em>ons</em></td></tr><tr><td>jullie</td><td><em>je</em></td></tr><tr><td>zij (pl)</td><td><em>zich</em></td></tr></table>
      <div class="box"><div class="ex">Ik voel <b>me</b> goed. — I feel good.</div><div class="ex">Hij wast <b>zich</b>. — He washes (himself).</div><div class="ex">Zij vergist <b>zich</b>. — She's mistaken.</div></div>`,
      ex:[
        {type:"gap", en:"I feel good. (zich voelen)", template:"ik voel ___ goed", ok:["me","mij"], rule:"ik → me/mij."},
        {type:"mc", en:"He washes himself.", stem:"hij wast ___", choices:["zich","hem","zijn","je"], answer:"zich", rule:"hij → zich."},
        {type:"gap", en:"She feels tired.", template:"zij voelt ___ moe", ok:["zich"], rule:"zij → zich."},
        {type:"type", en:"We feel happy. (zich voelen)", ok:["wij voelen ons blij","we voelen ons blij","wij voelen ons gelukkig","we voelen ons gelukkig"], rule:"wij → ons."},
        {type:"gap", en:"Do you feel good? (informal)", template:"voel jij ___ goed?", ok:["je"], rule:"jij → je."},
        {type:"mc", en:"They are mistaken. (zich vergissen)", stem:"zij vergissen ___", choices:["zich","hun","ze","hen"], answer:"zich", rule:"zij (pl) → zich."},
        {type:"type", en:"I'm mistaken. (zich vergissen)", ok:["ik vergis me","ik vergis mij"], rule:"ik → me."},
        {type:"gap", en:"He shaves. (zich scheren)", template:"hij scheert ___", ok:["zich"], rule:"hij → zich."}
      ]}
  ]},

  { code:"B1", note:"strong verbs, adjectives, clauses", units:[
    { id:"b1_strong", title:"Strong verbs", sub:"vowel-change participles",
      lesson:`<p>A few hundred common verbs are <b>strong</b>: the vowel mutates and the participle ends in <b>-en</b>, not -t/-d. They fall into vowel families — learn one, get the rest.</p>
      <table><tr><th>family</th><th>example</th></tr><tr><td>ij → ee → e</td><td><em>schrijven → schreef → geschreven</em></td></tr><tr><td>ie/ui → oo → o</td><td><em>kiezen → koos → gekozen</em></td></tr><tr><td>i → o → o</td><td><em>drinken → dronk → gedronken</em></td></tr><tr><td>e → a → o</td><td><em>nemen → nam → genomen</em></td></tr><tr><td>e → a → e</td><td><em>lezen → las → gelezen</em></td></tr></table>
      <p>The most frequent verbs are irregular and must be memorised: <em>zijn → geweest</em>, <em>hebben → gehad</em>, <em>gaan → gegaan</em>, <em>doen → gedaan</em>, <em>zien → gezien</em>.</p>`,
      ex:[
        {type:"mc", en:"Participle of 'schrijven'.", stem:"ik heb een brief ___", choices:["geschreven","geschrijven","geschrijfd","schrijfde"], answer:"geschreven", rule:"ij → ee → e."},
        {type:"type", en:"We drank beer. (drinken)", ok:["wij hebben bier gedronken","we hebben bier gedronken"], traps:[[/gedrinkt/,"Strong: gedronken."]], rule:"i → o → o."},
        {type:"mc", en:"Participle of 'nemen'.", stem:"ik heb het ___", choices:["genomen","genemen","genoomd","neemde"], answer:"genomen", rule:"e → a → o."},
        {type:"type", en:"I have read the book. (lezen)", ok:["ik heb het boek gelezen"], traps:[[/geleesd|gelezd/,"Strong: gelezen."]], rule:"e → a → e."},
        {type:"mc", en:"Participle of 'kiezen'.", stem:"ik heb ___", choices:["gekozen","gekiezen","gekiesd","koosde"], answer:"gekozen", rule:"ie → oo → o."},
        {type:"type", en:"He has done that. (doen)", ok:["hij heeft dat gedaan"], rule:"doen → gedaan (irregular)."},
        {type:"mc", en:"Participle of 'zien'.", stem:"ik heb het ___", choices:["gezien","geziend","gezeen","zag"], answer:"gezien", rule:"zien → gezien."},
        {type:"type", en:"I have spoken with him. (spreken, met)", ok:["ik heb met hem gesproken"], traps:[[/gesprekt/,"Strong: gesproken."]], rule:"e → a → o: gesproken."},
        {type:"type", en:"She has found the key. (vinden, de sleutel)", ok:["zij heeft de sleutel gevonden","ze heeft de sleutel gevonden"], rule:"i → o → o: gevonden."}
      ]},
    { id:"b1_adj", title:"Adjective endings", sub:"when to add -e",
      lesson:`<p>An adjective before a noun usually takes <b>-e</b>. You drop it in exactly <b>one</b> case: a <b>het-word</b> that is <b>singular</b> AND <b>indefinite</b> (een / geen / no article).</p>
      <div class="box"><div class="ex">de grot<b>e</b> man · het grot<b>e</b> huis · grot<b>e</b> huizen</div><div class="ex">een groot huis ← all three conditions met, so bare</div></div>
      <p>Watch the spelling when you add -e: <em>groot → grote</em> (one o, open syllable), <em>dik → dikke</em> (double k to keep it short). Adjectives already ending in -en never change: <em>een houten tafel</em>, <em>de open deur</em>.</p>`,
      ex:[
        {type:"mc", en:"a big house", stem:"een ___ huis", choices:["groot","grote","groote","grootte"], answer:"groot", rule:"het + singular + indefinite → no -e."},
        {type:"type", en:"the big house", ok:["het grote huis"], traps:[[/het groot huis/,"Definite → -e."]], rule:"Definite → -e."},
        {type:"type", en:"a nice woman (mooi)", ok:["een mooie vrouw"], rule:"de-word → -e."},
        {type:"mc", en:"a small book (klein, het boek)", stem:"een ___ boek", choices:["klein","kleine","kleinne","klijn"], answer:"klein", rule:"het + sing + indef → no -e."},
        {type:"type", en:"the expensive car (duur, de auto)", ok:["de dure auto"], traps:[[/duurde/,"Open syllable: dure, one u."]], rule:"de-word → -e, dure."},
        {type:"type", en:"big houses (plural)", ok:["grote huizen"], rule:"plural → always -e."},
        {type:"mc", en:"a new car (nieuw, de auto)", stem:"een ___ auto", choices:["nieuwe","nieuw","niewe","nieuwwe"], answer:"nieuwe", rule:"de-word → -e even when indefinite."},
        {type:"type", en:"cold water (koud, no article)", ok:["koud water"], traps:[[/koude water/,"No article + het-word = indefinite → no -e."]], rule:"No article → indefinite → bare (het water)."},
        {type:"type", en:"a wooden table (houten, de tafel)", ok:["een houten tafel"], rule:"-en adjectives never change."}
      ]},
    { id:"b1_comparative", title:"Comparatives & superlatives", sub:"groter, grootst",
      lesson:`<p>To compare, add <b>-er</b> (more) and <b>-st</b> (most) — just like English “bigger, biggest”:</p>
      <div class="box"><div class="ex">groot → grot<b>er</b> → grootst (big → bigger → biggest)</div><div class="ex">klein → klein<b>er</b> → kleinst</div></div>
      <p>“Than” is <em>dan</em>: <em>Hij is groter <b>dan</b> ik.</em> A few are irregular: <em>goed → beter → best</em>, <em>veel → meer → meest</em>, <em>weinig → minder → minst</em>, <em>graag → liever → liefst</em>.</p>
      <p>For “as … as”, use <em>net zo … als</em>: <em>Zij is net zo groot als hij.</em></p>`,
      ex:[
        {type:"type", en:"Comparative of 'groot' (bigger).", ok:["groter"], rule:"+ -er: groter."},
        {type:"mc", en:"'good → better'", stem:"goed → ___", choices:["beter","goeder","beste","meer"], answer:"beter", rule:"Irregular: goed → beter."},
        {type:"type", en:"He is bigger than I. (groot, dan)", ok:["hij is groter dan ik"], rule:"comparative + dan."},
        {type:"gap", en:"This book is more expensive. (duur)", template:"dit boek is ___", ok:["duurder"], rule:"duur → duurder."},
        {type:"mc", en:"'much → more'", stem:"veel → ___", choices:["meer","veler","meest","meerder"], answer:"meer", rule:"Irregular: veel → meer."},
        {type:"type", en:"the biggest house (groot, superlative)", ok:["het grootste huis"], rule:"superlative + -e: grootste."},
        {type:"type", en:"She is as tall as he. (net zo … als)", ok:["zij is net zo groot als hij","ze is net zo groot als hij"], rule:"net zo … als = as … as."},
        {type:"gap", en:"I like tea more. (graag → liever)", template:"ik drink ___ thee", ok:["liever"], rule:"graag → liever."},
        {type:"type", en:"This is the best book. (goed, superlative)", ok:["dit is het beste boek"], rule:"goed → best → beste."}
      ]},
    { id:"b1_conjunctions", title:"Conjunctions & word order", sub:"omdat, want, dat, als",
      lesson:`<p>Conjunctions join clauses — but they split into two groups that do <b>opposite</b> things to word order.</p>
      <p><b>Coordinating</b> (<em>en, maar, want, of, dus</em>) keep normal order — verb stays second:</p>
      <div class="box"><div class="ex">Ik blijf thuis, <b>want</b> ik <b>ben</b> ziek.</div></div>
      <p><b>Subordinating</b> (<em>omdat, dat, als, terwijl, hoewel, wanneer, sinds, zodat</em>) send the verb to the <b>end</b>:</p>
      <div class="box"><div class="ex">Ik blijf thuis <b>omdat</b> ik ziek <b>ben</b>.</div><div class="ex">Ik weet <b>dat</b> hij morgen <b>komt</b>.</div></div>
      <p><em>want</em> and <em>omdat</em> both mean “because” — but <em>want</em> keeps normal order, <em>omdat</em> kicks the verb to the end. That difference is a favourite exam trap.</p>`,
      ex:[
        {type:"type", en:"I'm staying home because I'm ill. (omdat)", ok:["ik blijf thuis omdat ik ziek ben"], traps:[[/omdat ik ben ziek/,"omdat → verb to the end: omdat ik ziek ben."]], rule:"omdat → verb to the end."},
        {type:"type", en:"I'm staying home, because I'm ill. (want)", ok:["ik blijf thuis want ik ben ziek"], traps:[[/want ik ziek ben/,"want keeps normal order: want ik ben ziek."]], rule:"want → normal order."},
        {type:"type", en:"I know that he's coming tomorrow. (dat, komen)", ok:["ik weet dat hij morgen komt"], traps:[[/dat hij komt morgen/,"morgen before the verb: dat hij morgen komt."]], rule:"dat → verb to the end."},
        {type:"mc", en:"'…, but it's expensive.' (normal order?)", stem:"het is mooi, ___ het is duur", choices:["maar","omdat","dat","terwijl"], answer:"maar", rule:"maar → coordinating, normal order."},
        {type:"type", en:"If it rains, I'll stay home. (als, regenen)", ok:["als het regent blijf ik thuis","als het regent, blijf ik thuis"], rule:"als → verb to end; main clause then inverts."},
        {type:"gap", en:"He says that he ___ tired. (dat, zijn)", template:"hij zegt dat hij moe ___", ok:["is"], rule:"dat → verb to the end: is."},
        {type:"type", en:"I'm learning Dutch because I live here. (omdat, wonen)", ok:["ik leer nederlands omdat ik hier woon"], rule:"omdat → woon at the end."},
        {type:"type", en:"She's happy because she passed. (want, geslaagd)", ok:["zij is blij want zij is geslaagd","ze is blij want ze is geslaagd"], rule:"want → normal order."}
      ]},
    { id:"b1_diedat", title:"Relative clauses", sub:"die / dat",
      lesson:`<p>“Who / which / that” is <em>die</em> for de-words and <em>dat</em> for het-words. The relative clause is a subordinate clause, so its verb goes to the <b>end</b>.</p>
      <div class="box"><div class="ex">de man <b>die</b> daar staat — the man who's standing there</div><div class="ex">het boek <b>dat</b> ik lees — the book that I'm reading</div></div>
      <p>After a preposition referring to a thing, Dutch uses <em>waar</em> + preposition instead: <em>de stoel <b>waarop</b> ik zit</em> (the chair I'm sitting on).</p>`,
      ex:[
        {type:"mc", en:"the man who works here", stem:"de man ___ hier werkt", choices:["die","dat","wie","wat"], answer:"die", rule:"de-word → die."},
        {type:"gap", en:"the book that I read", template:"het boek ___ ik lees", ok:["dat"], rule:"het-word → dat."},
        {type:"type", en:"the woman who lives here (wonen)", ok:["de vrouw die hier woont"], rule:"die + verb to the end."},
        {type:"mc", en:"the house that is big", stem:"het huis ___ groot is", choices:["dat","die","wat","wie"], answer:"dat", rule:"het-word → dat."},
        {type:"gap", en:"the children who play outside (de kinderen)", template:"de kinderen ___ buiten spelen", ok:["die"], rule:"plural → die (all plurals are de)."},
        {type:"type", en:"the man that I know (kennen)", ok:["de man die ik ken"], rule:"die + verb to the end."},
        {type:"mc", en:"the car that I bought", stem:"de auto ___ ik heb gekocht", choices:["die","dat","wat","wie"], answer:"die", rule:"de-word → die."},
        {type:"type", en:"the book that lies there (liggen)", ok:["het boek dat daar ligt"], rule:"het-word → dat, verb to end."}
      ]}
  ]},

  { code:"B2", note:"where your real errors live", units:[
    { id:"b2_er", title:"The five jobs of 'er'", sub:"the boss fight",
      lesson:`<p><em>er</em> does five jobs. The one that trips everyone: <b>er + preposition</b> replacing a thing. Dutch cannot say <em>met het</em> about an object — it fuses to <em>ermee</em>. And when an <b>adjective</b> is present, <em>er</em> leaps forward and the preposition strands at the end.</p>
      <div class="box"><div class="ex">1. Fake subject: <b>Er</b> staan drie katten in de tuin.</div><div class="ex">2. + preposition: Ik denk <b>eraan</b>. / Ik ben <b>er</b> blij <b>mee</b>.</div><div class="ex">3. Of them: Ik heb <b>er</b> drie.</div><div class="ex">4. Place: Ik ben <b>er</b> geweest.</div><div class="ex">5. Passive: <b>Er</b> wordt veel gewerkt.</div></div>
      <p>The fake-subject <em>er</em> agrees with the <b>real</b> subject: <em>er <b>staan</b> drie katten</em> (plural), not <em>er staat</em>.</p>`,
      ex:[
        {type:"type", en:"I'm happy with it. (watch the adjective)", ok:["ik ben er blij mee"], traps:[[/ermee|blij ermee/,"Adjective → split: er blij mee."]], rule:"er + adjective → split."},
        {type:"gap", en:"Are you afraid of it? (bang voor)", template:"ben je ___ bang ___", ok:["er voor"], rule:"er + adjective + preposition → split."},
        {type:"mc", en:"I have two of them.", stem:"ik heb ___ twee", choices:["er","—","ze","die"], answer:"er", rule:"er = of them."},
        {type:"type", en:"I'm waiting for it. (wachten op)", ok:["ik wacht erop"], traps:[[/er op/,"Adjacent → fused: erop."]], rule:"Fused when adjacent."},
        {type:"type", en:"There are three cats in the garden.", ok:["er zijn drie katten in de tuin","er staan drie katten in de tuin"], traps:[[/er staat|er is drie/,"Agrees with katten (plural): staan/zijn."]], rule:"Fake subject agrees with the real subject."},
        {type:"type", en:"I think about it. (denken aan)", ok:["ik denk eraan"], rule:"er + aan → eraan."},
        {type:"type", en:"He is proud of it. (trots op)", ok:["hij is er trots op"], traps:[[/ertrots|trots erop/,"Adjective splits them: er trots op."]], rule:"er + adjective + op → split."},
        {type:"mc", en:"A lot is worked here. (passive)", stem:"___ wordt hier veel gewerkt", choices:["er","het","dat","dit"], answer:"er", rule:"Passive placeholder er."},
        {type:"type", en:"Have you been there? (place)", ok:["ben je er geweest","ben jij er geweest"], rule:"er = there (place)."}
      ]},
    { id:"b2_passive", title:"The passive", sub:"worden + participle",
      lesson:`<p>The passive uses <em>worden</em> + past participle. NT2 writing loves it because it sounds formal and objective — the focus moves from who does it to what gets done.</p>
      <div class="box"><div class="ex">De brief <b>wordt</b> geschreven. — The letter is being written.</div><div class="ex">Er <b>wordt</b> veel gewerkt. — A lot of work is done. (impersonal)</div></div>
      <p>Past passive: <em>werd</em> (imperfect) or <em>is … geworden</em>: <em>De brief <b>werd</b> geschreven</em> / <em>De brief is geschreven.</em> Note the doer, if named, uses <em>door</em>: <em>De brief wordt <b>door</b> hem geschreven.</em></p>`,
      ex:[
        {type:"gap", en:"The letter is being written.", template:"de brief ___ geschreven", ok:["wordt"], rule:"passive = worden + participle."},
        {type:"mc", en:"A lot is worked here. (impersonal)", stem:"er ___ hier veel gewerkt", choices:["wordt","worden","is","word"], answer:"wordt", rule:"er wordt … gewerkt."},
        {type:"type", en:"The house is being sold. (verkopen)", ok:["het huis wordt verkocht"], rule:"worden + participle: wordt verkocht."},
        {type:"gap", en:"The letter was written. (imperfect passive)", template:"de brief ___ geschreven", ok:["werd"], rule:"past passive: werd."},
        {type:"type", en:"The books are being read. (lezen, plural)", ok:["de boeken worden gelezen"], rule:"plural → worden."},
        {type:"mc", en:"The letter is written by him. (door)", stem:"de brief wordt ___ hem geschreven", choices:["door","van","met","bij"], answer:"door", rule:"agent → door."},
        {type:"type", en:"The food is being cooked. (koken)", ok:["het eten wordt gekookt"], rule:"wordt + gekookt."},
        {type:"gap", en:"Here Dutch is spoken. (spreken)", template:"hier ___ Nederlands gesproken", ok:["wordt"], rule:"wordt + gesproken."}
      ]},
    { id:"b2_imperfect", title:"Perfect vs imperfect", sub:"sounding like B2",
      lesson:`<p>Writing everything in the perfect reads as B1. B2 writing <b>opens</b> in the perfect, then narrates in the <b>imperfect</b> (<em>ik werkte, het regende</em>). And <em>zijn, hebben</em> and the modals almost always take the imperfect: <em>was, had, kon, moest, wilde</em> — nobody writes <em>ik heb gekund</em>.</p>
      <div class="box"><div class="ex">Ik <b>ben</b> vorig jaar verhuisd. Het <b>regende</b> vaak, ik <b>kende</b> niemand, en mijn kamer <b>was</b> koud.</div></div>
      <p>The pattern: perfect to <b>announce</b> an event, imperfect to <b>describe and narrate</b> around it.</p>`,
      ex:[
        {type:"gap", en:"It rained every day. (imperfect of regenen)", template:"het ___ elke dag", ok:["regende"], rule:"imperfect for narration."},
        {type:"mc", en:"I was tired. (not 'ben geweest')", stem:"ik ___ moe", choices:["was","ben","heb","werd"], answer:"was", rule:"zijn → imperfect was in narration."},
        {type:"type", en:"I couldn't sleep. (kunnen, imperfect)", ok:["ik kon niet slapen"], rule:"modal → imperfect kon."},
        {type:"type", en:"I knew no one. (kennen, imperfect)", ok:["ik kende niemand"], rule:"imperfect narration: kende."},
        {type:"gap", en:"The house was cold. (zijn, imperfect)", template:"het huis ___ koud", ok:["was"], rule:"zijn → was."},
        {type:"type", en:"We had no money. (hebben, imperfect)", ok:["wij hadden geen geld","we hadden geen geld"], traps:[[/hebben geen geld/,"Narration → hadden."]], rule:"hebben → hadden."},
        {type:"mc", en:"I moved last year. (announce → perfect)", stem:"ik ___ vorig jaar verhuisd", choices:["ben","was","werd","had"], answer:"ben", rule:"Announce event → perfect (ben verhuisd)."},
        {type:"type", en:"She wanted to help. (willen, imperfect)", ok:["zij wilde helpen","ze wilde helpen"], rule:"modal → imperfect wilde."}
      ]},
    { id:"b2_omte", title:"om ... te & infinitive clauses", sub:"purpose and 'to'",
      lesson:`<p><em>om … te</em> + infinitive means “in order to / to”. The <em>te</em> + infinitive lands at the <b>end</b>:</p>
      <div class="box"><div class="ex">Ik ga naar de winkel <b>om</b> brood <b>te kopen</b>. — I'm going to the shop to buy bread.</div></div>
      <p>With a separable verb, <em>te</em> wedges inside: <em>om hem <b>op te bellen</b></em>. Some verbs take a plain <em>te</em>-infinitive without <em>om</em>: <em>Ik probeer <b>te</b> slapen</em>, <em>Ik hoop je <b>te</b> zien</em>, <em>Ik vergeet <b>te</b> bellen</em>.</p>
      <p>But after a <b>modal</b>, no <em>te</em>: <em>Ik wil slapen</em> (not <em>te slapen</em>).</p>`,
      ex:[
        {type:"type", en:"I go to the shop to buy bread. (om…te, kopen)", ok:["ik ga naar de winkel om brood te kopen"], rule:"om … te + infinitive at end."},
        {type:"gap", en:"I'm trying to sleep. (proberen te)", template:"ik probeer ___ slapen", ok:["te"], rule:"proberen + te-infinitive."},
        {type:"type", en:"I'm going to call to invite him. (om…te, uitnodigen)", ok:["ik bel om hem uit te nodigen"], traps:[[/te uitnodigen/,"Separable: uit te nodigen."]], rule:"te wedges inside separable verb."},
        {type:"mc", en:"After a modal, do you use 'te'?", stem:"ik wil ___ slapen", choices:["— (no te)","te","om te","om"], answer:"— (no te)", rule:"No te after a modal."},
        {type:"type", en:"I hope to see you. (hopen te, zien)", ok:["ik hoop je te zien","ik hoop jou te zien"], rule:"hopen + te-infinitive."},
        {type:"gap", en:"He forgot to call. (vergeten te, bellen)", template:"hij vergeet ___ bellen", ok:["te"], rule:"vergeten + te."},
        {type:"type", en:"She works to earn money. (om…te, verdienen)", ok:["zij werkt om geld te verdienen","ze werkt om geld te verdienen"], rule:"om … te verdienen."},
        {type:"type", en:"It's important to practise. (het is belangrijk om…te, oefenen)", ok:["het is belangrijk om te oefenen"], rule:"om te + infinitive."}
      ]}
  ]},

];

// Flatten units in curriculum order
const UNITS=[]; LEVELS.forEach(L=>L.units.forEach(u=>{u.level=L.code;UNITS.push(u);}));
const UNIT_INDEX={}; UNITS.forEach((u,i)=>UNIT_INDEX[u.id]=i);

// Placement test: one representative item per level, ascending. If you pass a
// level's probe you're assumed to know that level; you land at the first miss.
const PLACEMENT=[
  {level:"A0", ...{type:"mc", en:"'The house'", stem:"___ huis", choices:["het","de","een","dat"], answer:"het"}},

/* =========================================================================
   STORAGE
========================================================================= */
const KEY="nl_curric_v1"; let mem=null;
function canLS(){try{localStorage.setItem("__t","1");localStorage.removeItem("__t");return true;}catch(e){return false;}}
const HAS_LS=canLS();
function load(){if(HAS_LS){try{const r=localStorage.getItem(KEY);return r?JSON.parse(r):null;}catch(e){}}return mem;}
function save(s){if(HAS_LS){try{localStorage.setItem(KEY,JSON.stringify(s));return;}catch(e){}}mem=s;}
function today(){const d=new Date();return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");}
function dayNum(){return Math.floor(Date.now()/86400000);}
function freshState(){
  const unit={}; UNITS.forEach((u,i)=>unit[u.id]={status:"active",mastery:0});
  return {unit, placed:false, cards:{}, dayStreak:0, lastDay:null, reviews:0, right:0, mistakes:[]};
}
let S=load()||freshState();
if(!S.mistakes) S.mistakes=[]; // migrate older saved state
if(!S.dialogues) S.dialogues=[];
// MIGRATION: fill in any units missing from older saved progress (e.g. after a
// curriculum expansion). Without this, reading an unknown unit's status crashes.
(function migrateUnits(){
  if(!S.unit) S.unit={};
  // which levels has the user fully finished? (all their known units done)
  const levelDone={};
  LEVELS.forEach(L=>{
    const known=L.units.filter(u=>S.unit[u.id]);
    levelDone[L.code] = known.length>0 && known.every(u=>S.unit[u.id].status==="done");
  });
  let added=false, firstNew=null;
  LEVELS.forEach((L,li)=>{
    L.units.forEach(u=>{
      if(!S.unit[u.id]){
        added=true;
        // if this level (or a lower one) is already done, unlock the new unit; else lock it
        const lowerAllDone = LEVELS.slice(0,li).every(x=>levelDone[x.code]!==false) && (levelDone[L.code] || li===0);
        S.unit[u.id] = { status: (levelDone[L.code]? "active" : "locked"), mastery:0 };
        if(!firstNew) firstNew=u.id;
      }
    });
  });
  // UNLOCK ALL: every unit is openable. Convert any locked unit to active,
  // but keep completed units marked done (and preserve their mastery).
  let unlocked=false;
  UNITS.forEach(u=>{
    const st=S.unit[u.id];
    if(st && st.status==="locked"){ st.status="active"; unlocked=true; }
  });
  if(added||unlocked) save(S);
})();
(function(){const t=today();if(S.lastDay!==t){if(S.lastDay){const gap=Math.round((new Date(t)-new Date(S.lastDay))/86400000);S.dayStreak=gap===1?S.dayStreak+1:1;}else S.dayStreak=1;S.lastDay=t;save(S);}})();

/* --- Mistakes collection (lapse box) ---
   Each entry: {en, ok:[...], rule, trap, src:"gen"|"ai", added, misses}
   Keyed by the exact prompt+answer so the SAME sentence returns, deduped. */
function mistakeKey(it){ return (it.en||"")+"||"+((it.ok&&it.ok[0])||""); }
function addMistake(it, src){
  const key=mistakeKey(it);
  const existing=S.mistakes.find(m=>mistakeKey(m)===key);
  if(existing){ existing.misses=(existing.misses||1)+1; }
  else { S.mistakes.push({en:it.en, ok:it.ok, rule:it.rule, trap:it.trap||null, src, added:Date.now(), misses:1}); }
  save(S);
}
function removeMistake(it){
  const key=mistakeKey(it);
  const i=S.mistakes.findIndex(m=>mistakeKey(m)===key);
  if(i>-1){ S.mistakes.splice(i,1); save(S); }
}
function bumpMistake(it){ // got it wrong again in review: keep it, reset recency
  const key=mistakeKey(it);
  const m=S.mistakes.find(x=>mistakeKey(x)===key);
  if(m){ m.misses=(m.misses||1)+1; m.added=Date.now(); save(S); }
}

/* SM-2 lite for review scheduling of learned exercises */
function cardKey(uid,i){return uid+":"+i;}
function ensureCard(k){if(!S.cards[k])S.cards[k]={ef:2.5,reps:0,interval:0,due:0};return S.cards[k];}
function grade(c,ok){const q=ok?5:2;if(q<3){c.reps=0;c.interval=1;}else{c.reps++;c.interval=c.reps===1?1:c.reps===2?6:Math.round(c.interval*c.ef);c.ef=Math.max(1.3,c.ef+(0.1-(5-q)*(0.08+(5-q)*0.02)));}c.due=dayNum()+c.interval;}

        </div>

  });
  view.innerHTML=html;
  if(!S.placed){
    document.getElementById("place").onclick=startPlacement;

/* placement runner */
let pPos=0, pLanding=null;
function startPlacement(){pPos=0;pLanding=null;renderPlacement();}
function renderPlacement(){
  if(pPos>=PLACEMENT.length){return finishPlacement(PLACEMENT.length);} // passed everything
  const it=PLACEMENT[pPos];
  view.innerHTML=`<div class="card ex-wrap">
    <div class="eyebrow"><span>Placement ${pPos+1}/${PLACEMENT.length}</span><span class="kind">${it.level} probe</span></div>
    <div class="progressbar"><i style="width:${Math.round(100*pPos/PLACEMENT.length)}%"></i></div>
    ${renderExerciseBody(it)}
    <div class="row"><button class="act" id="go">Check</button><button class="ghost" id="dk">Don't know</button></div>
    <div id="verdict"></div></div>`;
  wireExercise(it,(correct)=>{
    if(!correct){ // land here
      return finishPlacement(pPos);
    }
    // passed this probe → advance after a beat
    const v=document.getElementById("verdict");
    v.className="verdict good";v.innerHTML=`<h3>Goed — level up</h3><div class="muted">You know ${it.level}. Next probe…</div>`;
    document.getElementById("go").textContent="Continue";
    document.getElementById("go").onclick=()=>{pPos++;renderPlacement();};
    document.getElementById("dk").style.display="none";
  }, ()=>finishPlacement(pPos));
}
function finishPlacement(landIdx){
  // landIdx = index into LEVELS of first failed probe (or LEVELS.length if passed all)
  const landedLevel = landIdx>=LEVELS.length ? null : LEVELS[landIdx].code;
  // mark all units in levels below landIdx as done; open the first unit of landing level
  let firstActive=null;
  LEVELS.forEach((L,li)=>{
    L.units.forEach(u=>{
      if(li<landIdx){ S.unit[u.id]={status:"done",mastery:Math.max((S.unit[u.id]&&S.unit[u.id].mastery)||0,0.7)}; }
      else { S.unit[u.id]={status:"active",mastery:(S.unit[u.id]&&S.unit[u.id].mastery)||0}; if(firstActive===null&&li===landIdx)firstActive=u.id; }
    });
  });
  if(landIdx>=LEVELS.length){ // passed everything — unlock all, active last
    UNITS.forEach(u=>S.unit[u.id]={status:"done",mastery:0.7});
  }
  S.placed=true; save(S);
  view.innerHTML=`<div class="banner center">
    <div class="lead">Placed</div>
    <div class="big">${landedLevel?("You're starting at "+landedLevel):"You cleared every probe"}</div>
    <p>${landedLevel?("Everything below "+landedLevel+" is marked as known and open for review. Your first lesson is ready."):"Impressive — the whole tree is unlocked for review. Jump into the B2 units, that's where the exam-level work is."}</p>
    <button class="cta" id="tolearn">See my tree</button></div>`;
  document.getElementById("tolearn").onclick=learn;
}
